<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ec;
    --paper: #fdfcfa;
    --ink: #1a1714;
    --muted: #8a8580;
    --accent: #c85a2a;
    --border: #e0dbd4;
    --shadow: rgba(26,23,20,0.08);
  }

  body {
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 2px 16px var(--shadow), 0 1px 3px var(--shadow);
    overflow: hidden;
  }

  .email-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .email-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .email-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    min-width: 0;
  }

  .email-input::placeholder { color: var(--muted); }

  .save-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 4px;
    transition: color 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .save-btn:hover { color: var(--accent); }

  .memo-area {
    padding: 20px;
  }

  #memo {
    width: 100%;
    min-height: 260px;
    border: none;
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.9;
    color: var(--ink);
    resize: none;
    outline: none;
  }

  #memo::placeholder { color: #bbb8b2; }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    gap: 8px;
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-clear {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 3px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-clear:hover { color: var(--ink); background: var(--border); }

  .btn-send {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    background: var(--accent);
    border: none;
    cursor: pointer;
    padding: 8px 20px;
    border-radius: 3px;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .btn-send:hover { opacity: 0.88; }
  .btn-send:active { transform: scale(0.97); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--ink);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: #c0392b; }
</style>
</head>
<body>

<div class="card">
  <div class="email-bar">
    <span class="email-label">送り先</span>
    <input type="email" id="emailTo" class="email-input" placeholder="example@email.com" autocomplete="email">
    <button class="save-btn" onclick="saveEmail()" title="メールアドレスを保存">💾</button>
  </div>

  <div class="memo-area">
    <textarea id="memo" placeholder="ここにメモを書く…" autofocus oninput="updateCount()"></textarea>
  </div>

  <div class="footer">
    <span class="char-count" id="count">0 字</span>
    <div class="actions">
      <button class="btn-clear" onclick="clearMemo()">クリア</button>
      <button class="btn-send" id="sendBtn" onclick="sendMail()">メールで送る</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'memo_mail_email';

  // 保存済みメールアドレスを復元
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) document.getElementById('emailTo').value = saved;

  function saveEmail() {
    const email = document.getElementById('emailTo').value.trim();
    if (!email) return;
    localStorage.setItem(STORAGE_KEY, email);
    showToast('メールアドレスを保存しました');
  }

  function updateCount() {
    const len = document.getElementById('memo').value.length;
    document.getElementById('count').textContent = len.toLocaleString() + ' 字';
  }

  function clearMemo() {
    if (!document.getElementById('memo').value) return;
    if (confirm('メモをクリアしますか？')) {
      document.getElementById('memo').value = '';
      updateCount();
      document.getElementById('memo').focus();
    }
  }

  function sendMail() {
    const to = document.getElementById('emailTo').value.trim();
    const body = document.getElementById('memo').value.trim();

    if (!to) { showToast('送り先のメールアドレスを入力してください', true); return; }
    if (!body) { showToast('メモが空です', true); return; }

    // 先頭1行をサブジェクトとして使用（空白の場合は「メモ」）
    const firstLine = body.split('\n')[0].slice(0, 60) || 'メモ';

    const mailtoLink = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(firstLine)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailtoLink;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  // Cmd/Ctrl+Enter でそのまま送信
  document.getElementById('memo').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendMail();
  });
</script>
</body>
</html>
